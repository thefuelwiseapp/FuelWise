name: fuelwise
description: "FuelWise - Find the cheapest fuel and save money"
publish_to: 'none'

version: 1.0.1+11

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.1.0
  geolocator: ^10.1.0
  permission_handler: ^11.0.1
  shared_preferences: ^2.2.2
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.2
  app_tracking_transparency: ^2.0.6 
  
  
  # Monetization
  google_mobile_ads: ^5.2.0
  purchases_flutter: ^8.2.3
  
  # Premium features
  firebase_core: ^3.8.1
  cloud_firestore: ^5.6.1
  flutter_local_notifications: ^18.0.1
  fl_chart: ^0.69.0
  
  # State management
  provider: ^6.1.2
  
  # Utilities
  intl: ^0.19.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.1

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/icon/icon.png"
  min_sdk_android: 21
  adaptive_icon_background: "#1B5E20"
  adaptive_icon_foreground: "assets/icon/icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/icon/