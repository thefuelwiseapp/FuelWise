workflows:
  ios-release:
    name: FuelWise iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: au.com.markwatson.fuelwise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS IPA
        script: flutter build ipa --release --export-options-plist=ios/exportOptions.plist
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: 75LVY8A8X4
        key_id: 75LVY8A8X4
        issuer_id: dfc8ec1e-598c-496e-9bc7-8a5a1497d272
        submit_to_testflight: false