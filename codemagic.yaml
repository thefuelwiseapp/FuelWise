workflows:
  ios-release:
    name: FuelWise iOS Release
    max_build_duration: 60
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: au.com.markwatson.fuelwise
      flutter: stable
      xcode: latest
      cocoapods: default
    scripts:
      - name: Get Flutter packages
        script: flutter pub get
      - name: Build iOS
        script: |
          flutter build ios --release --no-codesign
          cd ios
          xcodebuild -workspace Runner.xcworkspace \
            -scheme Runner \
            -sdk iphoneos \
            -configuration Release \
            archive -archivePath Runner.xcarchive \
            CODE_SIGN_STYLE=Manual \
            PROVISIONING_PROFILE_SPECIFIER="fuelwise_app_store_profile" \
            CODE_SIGN_IDENTITY="Apple Distribution"
          xcodebuild -exportArchive \
            -archivePath Runner.xcarchive \
            -exportOptionsPlist exportOptions.plist \
            -exportPath ../build/ios/ipa
    artifacts:
      - build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        api_key: 75LVY8A8X4
        key_id: 75LVY8A8X4
        issuer_id: dfc8ec1e-598c-496e-9bc7-8a5a1497d272
        submit_to_testflight: false